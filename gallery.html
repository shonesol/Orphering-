<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tujje Safaris Gallery</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

header{
  background:linear-gradient(90deg,#1e88e5,#ff9800,gold);
  color:white;
  padding:15px;
  text-align:center;
  position:relative;
}

.back-btn{
  position:absolute;
  left:15px;
  top:15px;
  background:#ff9800;
  color:white;
  padding:8px 12px;
  border-radius:5px;
  text-decoration:none;
}

.back-btn:hover{background:#1e88e5;}

.container{
  width:90%;
  max-width:600px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{background:#ff9800;}

.gallery{
  width:90%;
  max-width:1000px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  border-top:4px solid gold;
}

.card img,
.card video{
  width:100%;
}

.card p{
  text-align:center;
  padding:10px;
  margin:0;
  color:#1e88e5;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<a class="back-btn" href="index.html">⬅ Home</a>
<h1>📸 Tujje Safaris Gallery</h1>
</header>

<!-- UPLOAD -->
<div class="container">
<h2 style="color:#ff9800;">Upload Photo / Video</h2>

<input type="file" id="file" accept="image/*,video/*">

<select id="type">
<option value="photo">📸 Photo</option>
<option value="video">🎥 Video</option>
</select>

<button onclick="uploadFile()">Upload</button>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<script>

/* ================= FIREBASE (FROM YOUR PROJECT) ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAUxwj4JVPWAz3oDjPTSaEUot49pHxmWQg",
  authDomain: "tujjesafari-dbda9.firebaseapp.com",
  projectId: "tujjesafari-dbda9",
  storageBucket: "tujjesafari-dbda9.appspot.com",
  messagingSenderId: "39777982092",
  appId: "1:39777982092:web:bc488a73cf7bb637204da9",
  measurementId: "G-2PP6P43TER"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* ================= UPLOAD ================= */
async function uploadFile(){

const file = document.getElementById("file").files[0];
const type = document.getElementById("type").value;

if(!file){
alert("Select a file first");
return;
}

const ref = storage.ref("gallery/" + Date.now() + "_" + file.name);

try{

// upload file
await ref.put(file);
const url = await ref.getDownloadURL();

// save metadata
await db.collection("gallery").add({
url,
type,
name:file.name,
createdAt:new Date()
});

alert("✅ Upload successful!");
document.getElementById("file").value="";

loadGallery();

}catch(err){
console.error(err);
alert("❌ Upload failed");
}
}

/* ================= LOAD GALLERY ================= */
async function loadGallery(){

const snap = await db.collection("gallery")
.orderBy("createdAt","desc")
.get();

const gallery = document.getElementById("gallery");
gallery.innerHTML="";

snap.forEach(doc=>{
const item = doc.data();

const div = document.createElement("div");
div.className="card";

if(item.type==="photo"){
div.innerHTML=`
<img src="${item.url}">
<p>📸 ${item.name}</p>
`;
}else{
div.innerHTML=`
<video controls>
<source src="${item.url}">
</video>
<p>🎥 ${item.name}</p>
`;
}

gallery.appendChild(div);
});
}

loadGallery();

</script>

</body>
</html>
