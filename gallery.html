<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tujje Safaris Pro System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f0e6;
}

header{
  background:#0b5ed7;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.hero{
  background:linear-gradient(90deg,#f39c12,#0b5ed7,#d4af37);
  color:white;
  text-align:center;
  padding:30px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  padding:20px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

button{
  padding:8px;
  margin:5px;
  cursor:pointer;
}

#adminPanel{
  display:none;
  padding:20px;
  background:white;
  margin:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🌍 Tujje Safaris Pro Gallery</header>

<div class="hero">
<h2>Cloudinary + Firebase System</h2>
</div>

<div class="gallery" id="gallery"></div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>Admin Upload</h3>
<input type="file" id="file"><br><br>
<select id="category">
  <option value="safari">Safari</option>
  <option value="wildlife">Wildlife</option>
  <option value="hotel">Hotels</option>
</select>
<br><br>
<button onclick="uploadImage()">Upload</button>
<button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<script type="module">

// ===== FIREBASE IMPORTS =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  signOut, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== YOUR FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyAUxwj4JVPWAz3oDjPTSaEUot49pHxmWQg",
  authDomain: "tujjesafari-dbda9.firebaseapp.com",
  projectId: "tujjesafari-dbda9",
  storageBucket: "tujjesafari-dbda9.appspot.com",
  messagingSenderId: "39777982092",
  appId: "1:39777982092:web:bc488a73cf7bb637204da9"
};

// ===== INIT FIREBASE =====
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ===== CLOUDINARY =====
const CLOUD_NAME = "tujjesafaris";
const UPLOAD_PRESET = "Unsigned";

// ===== AUTH FUNCTIONS =====
window.login = function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
  .catch(err => alert(err.message));
}

window.logout = function(){
  signOut(auth);
}

// ===== AUTH STATE =====
onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("loginBox").style.display="none";
  } else {
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("loginBox").style.display="block";
  }
});

// ===== LOAD IMAGES =====
async function loadImages(){
  const snap = await getDocs(collection(db,"images"));
  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";

  snap.forEach(docu=>{
    let data = docu.data();

    let div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${data.url}">
      <div class="card-content">
        <b>${data.category}</b><br>
        <button onclick="deleteImg('${docu.id}')">Delete</button>
      </div>
    `;

    gallery.appendChild(div);
  });
}
loadImages();

// ===== DELETE IMAGE =====
window.deleteImg = async function(id){
  await deleteDoc(doc(db,"images",id));
  loadImages();
}

// ===== UPLOAD TO CLOUDINARY =====
window.uploadImage = async function(){
  let file = document.getElementById("file").files[0];
  let category = document.getElementById("category").value;

  if(!file) return alert("Select file");

  let form = new FormData();
  form.append("file",file);
  form.append("upload_preset",UPLOAD_PRESET);
  form.append("folder","tujje");

  let res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method:"POST", body:form }
  );

  let data = await res.json();

  await addDoc(collection(db,"images"),{
    url:data.secure_url,
    category:category,
    time:Date.now()
  });

  loadImages();
  alert("Uploaded!");
}

</script>

</body>
</html>
