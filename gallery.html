<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tujje Safari Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
:root{
  --blue:#1565c0;
  --orange:#ff9800;
  --gold:#d4af37;
  --dark:#0f172a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:var(--dark);color:white;}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.7);
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
  backdrop-filter:blur(10px);
}

.logo{color:var(--gold);font-weight:800;font-size:20px;}

.home-btn{
  background:linear-gradient(45deg,var(--orange),var(--gold));
  padding:8px 15px;
  border-radius:20px;
  color:black;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h1{font-size:45px;color:var(--gold);}
.hero p{color:#ddd;margin-top:10px;}

/* SECTION TITLE */
.section-title{
  text-align:center;
  margin:60px 0 20px;
  color:var(--orange);
  font-size:28px;
}

/* SWIPER */
.swiper{
  width:90%;
}
.swiper-slide img{
  width:100%;
  height:400px;
  object-fit:cover;
  border-radius:15px;
  border:3px solid var(--gold);
}

/* GRID GALLERY */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.grid img,.grid video{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  border:2px solid var(--blue);
  transition:0.3s;
}

.grid img:hover,.grid video:hover{
  transform:scale(1.05);
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.modal img,.modal video{
  max-width:90%;
  max-height:80%;
  border-radius:15px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  user-select:none;
}

.prev{left:20px;}
.next{right:20px;}

</style>
</head>

<body>

<nav>
  <div class="logo">TUJJE SAFARI</div>
  <a href="index.html" class="home-btn">🏠 Home</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Explore Uganda With Tujje Safari</h1>
    <p>Luxury safaris, wildlife, and unforgettable adventures</p>
  </div>
</section>

<!-- SLIDER PHOTOS -->
<h2 class="section-title">Featured Safari Photos</h2>

<div class="swiper mySwiper">
  <div class="swiper-wrapper">
    <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1549366021-9f761d450615"></div>
    <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1526336024174-e58f5cdd8e13"></div>
    <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1508672019048-805c876b67e2"></div>
  </div>
</div>

<!-- CLICKABLE PHOTOS -->
<h2 class="section-title">Photo Gallery</h2>

<div class="grid">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d">
  <img src="https://images.unsplash.com/photo-1508672019048-805c876b67e2">
</div>

<!-- VIDEO GALLERY -->
<h2 class="section-title">Safari Videos</h2>

<div class="grid">
  <video src="your-video1.mp4"></video>
  <video src="your-video2.mp4"></video>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">×</span>
  <span class="nav-btn prev" onclick="prev()">❮</span>
  <span class="nav-btn next" onclick="next()">❯</span>

  <img id="modalImg">
  <video id="modalVideo" controls style="display:none;"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let swiper = new Swiper(".mySwiper", {
  loop:true,
  autoplay:{delay:2500}
});

/* MODAL SYSTEM */
let items = [];
let index = 0;

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalVideo = document.getElementById("modalVideo");

/* collect images + videos */
document.querySelectorAll(".grid img, .grid video").forEach((el, i)=>{
  items.push(el);

  el.addEventListener("click", ()=>{
    index = i;
    openModal(el);
  });
});

function openModal(el){
  modal.style.display="flex";

  if(el.tagName==="IMG"){
    modalImg.style.display="block";
    modalVideo.style.display="none";
    modalImg.src = el.src;
  }else{
    modalImg.style.display="none";
    modalVideo.style.display="block";
    modalVideo.src = el.src;
    modalVideo.play();
  }
}

function closeModal(){
  modal.style.display="none";
  modalVideo.pause();
}

function next(){
  index = (index+1)%items.length;
  openModal(items[index]);
}

function prev(){
  index = (index-1+items.length)%items.length;
  openModal(items[index]);
}

/* close on background click */
modal.addEventListener("click",(e)=>{
  if(e.target===modal) closeModal();
});
</script>

</body>
</html>
